<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── 인증 화면 ───────────────────────────────────────── -->
  <section id="auth-screen">
    <div class="auth-card">
      <h1 class="auth-title">Kanban Board</h1>
      <p class="auth-subtitle">로그인하여 시작하세요</p>

      <div class="social-btns">
        <button id="btn-google" class="social-btn google-btn">
          <svg width="18" height="18" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.5 20-21 0-1.4-.2-2.7-.5-4z" fill="#FFC107"/>
            <path d="M6.3 14.7l7 5.1C15.1 16.1 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3c-7.6 0-14.2 4.3-17.7 10.7z" fill="#FF3D00"/>
            <path d="M24 45c5.5 0 10.4-1.9 14.2-5l-6.6-5.6C29.6 36 27 37 24 37c-6.1 0-10.7-3.9-11.8-9.5l-7 5.4C8.1 40.7 15.5 45 24 45z" fill="#4CAF50"/>
            <path d="M44.5 20H24v8.5h11.8c-.6 2.7-2.1 4.9-4.2 6.5l6.6 5.6C42.2 36.9 45 30.9 45 24c0-1.4-.2-2.7-.5-4z" fill="#1976D2"/>
          </svg>
          Google로 계속하기
        </button>
        <button id="btn-github" class="social-btn github-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          GitHub로 계속하기
        </button>
      </div>

      <div class="divider"><span>또는 이메일로</span></div>

      <form id="email-form" novalidate>
        <div class="form-group">
          <label for="input-email">이메일</label>
          <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="input-password">비밀번호</label>
          <input type="password" id="input-password" placeholder="6자 이상" autocomplete="current-password" required minlength="6">
        </div>
        <p id="auth-error" class="auth-error hidden"></p>
        <div class="email-btns">
          <button type="submit" id="btn-login" class="email-btn primary-btn">로그인</button>
          <button type="button" id="btn-signup" class="email-btn secondary-btn">회원가입</button>
        </div>
      </form>
    </div>
  </section>

  <!-- ── 보드 화면 ───────────────────────────────────────── -->
  <section id="board-screen" class="hidden">
    <header class="app-header">
      <h1>Kanban Board</h1>
      <div class="header-user">
        <span id="user-email" class="user-email"></span>
        <button id="btn-logout" class="logout-btn">로그아웃</button>
      </div>
    </header>

    <main id="board">
      <section class="column" id="col-todo" data-column="todo">
        <div class="column-header todo-header">
          <span class="column-title">TO-DO</span>
          <span class="column-badge" id="badge-todo">0</span>
        </div>
        <ul class="card-list" id="list-todo"></ul>
        <div class="add-card-form">
          <input type="text" class="card-input" data-column="todo" placeholder="새 카드 추가..." maxlength="200">
          <button class="add-btn" data-column="todo">추가</button>
        </div>
      </section>

      <section class="column" id="col-inprogress" data-column="inprogress">
        <div class="column-header inprogress-header">
          <span class="column-title">In-Progress</span>
          <span class="column-badge" id="badge-inprogress">0</span>
        </div>
        <ul class="card-list" id="list-inprogress"></ul>
        <div class="add-card-form">
          <input type="text" class="card-input" data-column="inprogress" placeholder="새 카드 추가..." maxlength="200">
          <button class="add-btn" data-column="inprogress">추가</button>
        </div>
      </section>

      <section class="column" id="col-done" data-column="done">
        <div class="column-header done-header">
          <span class="column-title">Done</span>
          <span class="column-badge" id="badge-done">0</span>
        </div>
        <ul class="card-list" id="list-done"></ul>
        <div class="add-card-form">
          <input type="text" class="card-input" data-column="done" placeholder="새 카드 추가..." maxlength="200">
          <button class="add-btn" data-column="done">추가</button>
        </div>
      </section>
    </main>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
